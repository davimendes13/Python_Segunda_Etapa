{% extends "layout.html" %}
{% block title %}Nova locação{% endblock %}

{% block content %}

<h1>Nova locação</h1>

<form method="POST" action="{{ url_for('locadora.cadastrar') }}">

    <div class="form-grupo">
        <label>Cliente</label>

        <select name="cliente_id" required>

            <option value="">
                Selecione...
            </option>

            {% for cliente in clientes %}
            
            <option value="{{ cliente.id }}">
                {{ cliente.nome }}
            </option>

            {% endfor %}

        </select>
    </div>


    <div class="form-grupo">
        <label>Veículo</label>

        <select name="veiculo_id" required>

            <option value="">
                Selecione...
            </option>

            {% for veiculo in veiculos %}

            <option value="{{ veiculo.id }}">
                {{ veiculo.modelo }} - {{ veiculo.placa }}
            </option>

            {% endfor %}

        </select>
    </div>


    <div class="form-grupo">
        <label>Data início</label>

        <input 
            type="date" 
            name="data_inicio" 
            required
        >
    </div>


    <div class="form-grupo">
        <label>Data fim</label>

        <input 
            type="date" 
            name="data_fim" 
            required
        >
    </div>


    <div class="form-grupo">
        <label>Valor total (R$)</label>

        <input 
            type="number" 
            name="valor_total" 
            step="0.01" 
            min="0" 
            required
        >
    </div>


    <button class="btn" type="submit">
        Salvar
    </button>

</form>


<p>
    <a href="{{ url_for('locadora.index') }}">
        ← Voltar
    </a>
</p>

{% endblock %}
