<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container-form">
        <h1>{{ titulo }}</h1>

        {% if erro %}
            <div class="alerta-erro">
                ⚠️ {{ erro }}
            </div>
        {% endif %}

        <!-- Se houver produto_id, envia para editar; caso contrário, para cadastrar -->
        <form action="{% if produto_id %}{{ url_for('editar', produto_id=produto_id) }}{% else %}{{ url_for('cadastrar') }}{% endif %}" method="POST">
            
            <div class="campo">
                <label for="nome">Nome do Produto:</label>
                <input type="text" id="nome" name="nome" value="{{ nome or '' }}" placeholder="Ex.: Notebook Gamer Nitro 5">
            </div>

            <div class="campo">
                <label for="categoria">Categoria:</label>
                <input type="text" id="categoria" name="categoria" value="{{ categoria or '' }}" placeholder="Ex.: Notebook, Smartphone, Acessório">
            </div>

            <div class="grupo-linha">
                <div class="campo">
                    <label for="preco">Preço (R$):</label>
                    <input type="text" id="preco" name="preco" value="{{ preco or '' }}" placeholder="0.00">
                </div>

                <div class="campo">
                    <label for="estoque">Quantidade em Estoque:</label>
                    <input type="number" id="estoque" name="estoque" value="{{ estoque or 0 }}" min="0">
                </div>
            </div>

            <div class="botoes-form">
                <button type="submit" class="btn btn-salvar">💾 Salvar Produto</button>
                <a href="{{ url_for('index') }}" class="btn btn-cancelar">Voltar para a Lista</a>
            </div>
        </form>
    </div>
</body>
</html>
